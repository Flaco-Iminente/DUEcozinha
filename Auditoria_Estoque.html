<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auditoria de Estoque — DUE Restaurante</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #F8F6F0; color: #111009; min-height: 100vh; }

  header {
    background: #111009; color: #F8F6F0;
    padding: 20px 32px 16px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }
  .logo-area h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 1px; color: #E8C870; }
  .logo-area p  { font-size: .78rem; opacity: .6; margin-top: 3px; letter-spacing: .5px; }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn { border: none; border-radius: 6px; cursor: pointer; font-size: .82rem; font-weight: 700; padding: 8px 18px; transition: .15s; letter-spacing: .3px; }
  .btn-gold    { background: #E8C870; color: #111009; }
  .btn-gold:hover  { background: #d4b35a; }
  .btn-dark    { background: #2a2a2a; color: #F8F6F0; border: 1.5px solid #444; }
  .btn-dark:hover  { background: #3a3a3a; }
  .btn-red     { background: #c0392b; color: #fff; }
  .btn-red:hover   { background: #a93226; }
  .btn-green   { background: #27ae60; color: #fff; }
  .btn-green:hover { background: #219150; }
  .btn-sm { padding: 5px 12px; font-size: .76rem; }

  .toolbar {
    background: #fff; border-bottom: 1px solid #e0dbd0;
    padding: 12px 32px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  .meta-field { display: flex; align-items: center; gap: 8px; font-size: .82rem; color: #555; }
  .meta-field label { font-weight: 700; white-space: nowrap; }
  .meta-field input, .meta-field select {
    border: 1.5px solid #d0c9be; border-radius: 5px;
    padding: 5px 10px; font-size: .82rem; background: #faf9f5; outline: none; transition: .15s; color: #111009;
  }
  .meta-field input:focus, .meta-field select:focus { border-color: #E8C870; }

  .progress-wrap  { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .progress-label { font-size: .8rem; color: #888; font-weight: 600; }
  .progress-bar-bg   { width: 120px; height: 8px; background: #e8e2d8; border-radius: 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #E8C870; border-radius: 4px; transition: width .3s; }

  main { padding: 24px 32px; max-width: 1000px; margin: 0 auto; }

  /* ── AUDIT SECTIONS ── */
  .section { margin-bottom: 20px; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
  .section-header {
    display: flex; align-items: center; gap: 10px;
    padding: 13px 18px; cursor: pointer; user-select: none;
    background: #111009; color: #E8C870;
  }
  .section-header:hover { background: #1e1c16; }
  .section-header .sec-emoji  { font-size: 1.1rem; }
  .section-header .sec-title  { flex: 1; font-size: .92rem; font-weight: 700; letter-spacing: .5px; }
  .section-header .sec-badge  {
    background: rgba(232,200,112,.18); border: 1px solid rgba(232,200,112,.4);
    color: #E8C870; border-radius: 20px; padding: 2px 10px; font-size: .72rem; font-weight: 700;
  }
  .section-header .chevron { font-size: .7rem; transition: .2s; opacity: .6; }
  .section-header.collapsed .chevron { transform: rotate(-90deg); }
  .section-body { background: #fff; }
  .section-body.hidden { display: none; }

  /* ── TABLE ── */
  .audit-table { width: 100%; border-collapse: collapse; }
  .audit-table th {
    background: #f5f2eb; color: #555; font-size: .75rem; font-weight: 700;
    padding: 8px 14px; text-align: left; border-bottom: 2px solid #e0dbd0;
    text-transform: uppercase; letter-spacing: .4px;
  }
  .audit-table th.center { text-align: center; }
  .audit-table tr.item-row { border-bottom: 1px solid #f0ece4; }
  .audit-table tr.item-row:hover { background: #fdf9f0; }
  .audit-table tr.item-row.alert-row { background: #fff5f5; }
  .audit-table tr.item-row.alert-row:hover { background: #ffe8e8; }
  .audit-table tr.item-row.filled { background: #f0fdf4; }
  .audit-table td { padding: 8px 14px; font-size: .85rem; vertical-align: middle; }

  .item-name { font-weight: 600; color: #111009; }
  .item-ref   { color: #888; font-size: .78rem; }
  .item-unit  { text-align: center; color: #666; font-size: .8rem; }

  .qty-input {
    width: 80px; border: 1.5px solid #d0c9be; border-radius: 6px;
    padding: 5px 8px; font-size: .88rem; font-weight: 700; text-align: center;
    background: #faf9f5; outline: none; transition: .15s; color: #111009;
  }
  .qty-input:focus  { border-color: #E8C870; background: #fffdf5; }
  .qty-input.has-value { border-color: #27ae60; background: #f0fdf4; }

  .obs-input {
    width: 100%; border: 1.5px solid #d0c9be; border-radius: 6px;
    padding: 5px 8px; font-size: .78rem; background: #faf9f5; outline: none; transition: .15s; color: #555;
  }
  .obs-input:focus { border-color: #E8C870; }

  .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin: 0 auto; }
  .dot-empty  { background: #ddd; }
  .dot-filled { background: #27ae60; }
  .dot-alert  { background: #e74c3c; }
  td.center { text-align: center; }
  .ref-qty  { color: #999; font-size: .78rem; }

  /* ── PEDIDOS SECTION ── */
  .pedido-wrap { max-width: 1000px; margin: 0 auto; padding: 0 32px 24px; }
  .pedido-section { border-radius: 10px; overflow: hidden; box-shadow: 0 2px 10px rgba(0,0,0,.1); }
  .pedido-header {
    display: flex; align-items: center; gap: 10px;
    padding: 13px 18px; background: #2d6a1f; color: #fff; cursor: pointer; user-select: none;
  }
  .pedido-header:hover { background: #245518; }
  .pedido-header .sec-title { flex: 1; font-size: .92rem; font-weight: 700; letter-spacing: .5px; }
  .pedido-header .sec-badge {
    background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.35);
    color: #fff; border-radius: 20px; padding: 2px 10px; font-size: .72rem; font-weight: 700;
  }
  .pedido-header .chevron { font-size: .7rem; transition: .2s; opacity: .6; }
  .pedido-header.collapsed .chevron { transform: rotate(-90deg); }
  .pedido-body { background: #fff; }
  .pedido-body.hidden { display: none; }
  .pedido-row.urgente-row  { background: #fff8f0 !important; }
  .pedido-row.urgente-row:hover { background: #fff0e0 !important; }
  .pedido-add-row {
    padding: 10px 18px; background: #f5f2eb;
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    border-top: 1px solid #e0dbd0;
  }

  /* ── FOOTER ── */
  .form-footer {
    background: #111009; color: #F8F6F0;
    padding: 14px 32px; display: flex; gap: 12px; align-items: center;
    justify-content: space-between; flex-wrap: wrap;
  }
  .form-footer p { font-size: .8rem; opacity: .5; }

  /* ── MODAL ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.65); z-index: 100;
    align-items: center; justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 12px; padding: 28px 32px;
    max-width: 560px; width: 94%; max-height: 80vh; overflow-y: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,.3);
  }
  .modal h2 { font-size: 1.1rem; color: #111009; margin-bottom: 16px; }
  .modal pre { font-size: .78rem; background: #f5f2eb; border-radius: 6px; padding: 14px; white-space: pre-wrap; }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }

  @media (max-width: 620px) {
    header, .toolbar, main, .form-footer, .pedido-wrap { padding-left: 14px; padding-right: 14px; }
    .qty-input { width: 60px; }
  }
  @media print {
    .header-actions, .toolbar .btn, .form-footer, .pedido-wrap { display: none !important; }
    body { background: #fff; }
    .qty-input { border: 1px solid #bbb; }
    .section { box-shadow: none; border: 1px solid #ccc; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <h1>DUE RESTAURANTE</h1>
    <p>AUDITORIA DE ESTOQUE — Ozanne Consultoria</p>
  </div>
  <div class="header-actions">
    <button class="btn btn-dark" onclick="window.print()">🖨️ Imprimir</button>
    <button class="btn btn-red btn-sm" onclick="clearAll()">Limpar</button>
    <button class="btn btn-gold" onclick="showSummary()">📋 Ver Resumo</button>
    <button class="btn btn-green" onclick="exportJSON()">💾 Salvar dados</button>
  </div>
</header>

<div class="toolbar">
  <div class="meta-field">
    <label>📅 Data</label>
    <input type="date" id="audit-date">
  </div>
  <div class="meta-field">
    <label>👤 Responsável</label>
    <input type="text" id="audit-resp" placeholder="Nome do funcionário">
  </div>
  <div class="meta-field">
    <label>🔄 Turno</label>
    <select id="audit-turno">
      <option value="">— selecionar —</option>
      <option>Manhã</option><option>Tarde</option>
      <option>Noite</option><option>Abertura</option><option>Fechamento</option>
    </select>
  </div>
  <div class="progress-wrap">
    <span class="progress-label" id="prog-label">0 / 0 itens</span>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
</div>

<main id="main"></main>

<div class="pedido-wrap">
  <div class="pedido-section">
    <div class="pedido-header" id="pedido-hdr" onclick="togglePedido()">
      <span>🛒</span>
      <span class="sec-title">LISTA DE PEDIDOS DA SEMANA</span>
      <span class="sec-badge" id="pedido-badge">0 / 0 pedidos</span>
      <span class="chevron">▼</span>
    </div>
    <div class="pedido-body" id="pedido-body">
      <table class="audit-table">
        <thead>
          <tr>
            <th style="width:36px" class="center">✓</th>
            <th>Item</th>
            <th class="center" style="width:70px">Unid.</th>
            <th class="center" style="width:110px">Quantidade</th>
            <th style="width:180px">Fornecedor</th>
            <th class="center" style="width:110px">Prioridade</th>
            <th style="width:44px"></th>
          </tr>
        </thead>
        <tbody id="tbody-pedidos"></tbody>
      </table>
      <div class="pedido-add-row">
        <button class="btn btn-gold btn-sm"  onclick="addPedidoRow()">+ Adicionar item</button>
        <button class="btn btn-dark btn-sm"  onclick="addPedidoRow('Feijão','kg')">+ Feijão</button>
        <button class="btn btn-dark btn-sm"  onclick="addPedidoRow('Calabresa','kg')">+ Calabresa</button>
        <button class="btn btn-dark btn-sm"  onclick="addPedidoRow('Charque','kg')">+ Charque</button>
        <button class="btn btn-dark btn-sm"  onclick="addPedidoRow('Bacon','kg')">+ Bacon</button>
        <button class="btn btn-green btn-sm" onclick="exportPedido()" style="margin-left:auto">📤 Copiar pedido</button>
      </div>
    </div>
  </div>
</div>

<div class="form-footer">
  <p>Preencha "Qtde contada" para cada item. Deixe em branco se não verificado.</p>
  <div style="display:flex;gap:8px">
    <button class="btn btn-dark btn-sm" onclick="expandAll()">Expandir tudo</button>
    <button class="btn btn-dark btn-sm" onclick="collapseAll()">Recolher tudo</button>
    <button class="btn btn-gold btn-sm" onclick="showSummary()">📋 Gerar resumo</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeOverlay()">
  <div class="modal">
    <h2>📋 Resumo da Auditoria</h2>
    <pre id="modal-content"></pre>
    <div class="modal-actions">
      <button class="btn btn-dark btn-sm" onclick="closeOverlay()">Fechar</button>
      <button class="btn btn-gold btn-sm" onclick="navigator.clipboard.writeText(document.getElementById('modal-content').textContent).then(()=>alert('Copiado!'))">Copiar</button>
    </div>
  </div>
</div>

// ── STATE AUDITORIA ───────────────────────────────────────────────────────────
const state = {};
function key(secId, idx) { return secId + '_' + idx; }

// ── RENDER AUDITORIA ──────────────────────────────────────────────────────────
function render() {
  const d = document.getElementById('audit-date');
  if (!d.value) d.value = new Date().toISOString().slice(0,10);

  const main = document.getElementById('main');
  main.innerHTML = '';

  sections.forEach(sec => {
    // init state
    sec.items.forEach((_, idx) => {
      if (!state[key(sec.id, idx)]) state[key(sec.id, idx)] = { qty: '', obs: '' };
    });

    const wrap = document.createElement('div');
    wrap.className = 'section';
    wrap.id = 'sec_' + sec.id;

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = '<span class="sec-emoji">' + sec.emoji + '</span>'
      + '<span class="sec-title">' + sec.title + '</span>'
      + '<span class="sec-badge" id="badge_' + sec.id + '">0 / ' + sec.items.length + '</span>'
      + '<span class="chevron">▼</span>';
    hdr.addEventListener('click', function() { toggleSec(sec.id); });
    wrap.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'section-body';
    body.id = 'body_' + sec.id;

    const table = document.createElement('table');
    table.className = 'audit-table';
    const thead = '<thead><tr>'
      + '<th style="width:36px" class="center">✓</th>'
      + '<th>Item</th>'
      + '<th class="center" style="width:70px">Unidade</th>'
      + '<th class="center" style="width:100px">Ref. anterior</th>'
      + '<th class="center" style="width:110px">Qtde contada</th>'
      + '<th style="width:180px">Obs / validade</th>'
      + '</tr></thead>';
    table.innerHTML = thead + '<tbody id="tbody_' + sec.id + '"></tbody>';
    body.appendChild(table);
    wrap.appendChild(body);
    main.appendChild(wrap);

    const tbody = document.getElementById('tbody_' + sec.id);
    sec.items.forEach(function(item, idx) {
      const k = key(sec.id, idx);
      const s = state[k];
      const tr = document.createElement('tr');
      tr.className = 'item-row' + (item.alert ? ' alert-row' : '');
      tr.id = 'row_' + k;
      tr.innerHTML = '<td class="center"><span class="status-dot dot-empty" id="dot_' + k + '"></span></td>'
        + '<td><div class="item-name">' + (item.alert ? '⚠️ ' : '') + item.name + '</div>'
        + (item.alert ? '<div class="item-ref" style="color:#e74c3c">Verificar validade!</div>' : '') + '</td>'
        + '<td class="item-unit">' + item.unit + '</td>'
        + '<td class="center ref-qty">' + (item.ref != null ? item.ref : '—') + '</td>'
        + '<td class="center"><input class="qty-input" type="text" inputmode="decimal"'
        + ' id="qty_' + k + '" value="' + s.qty + '" placeholder="0"'
        + ' oninput="onQty(\'' + k + '\')">'
        + '</td>'
        + '<td><input class="obs-input" type="text"'
        + ' id="obs_' + k + '" value="' + s.obs + '" placeholder="validade, lote, obs…"'
        + ' oninput="state[\'' + k + '\'].obs=this.value">'
        + '</td>';
      tbody.appendChild(tr);
    });

    updateBadge(sec.id);
  });

  updateProgress();
}

function onQty(k) {
  const val = document.getElementById('qty_' + k).value.trim();
  state[k].qty = val;
  const dot = document.getElementById('dot_' + k);
  const inp = document.getElementById('qty_' + k);
  const row = document.getElementById('row_' + k);
  if (val !== '') {
    dot.className = 'status-dot ' + (row.classList.contains('alert-row') ? 'dot-alert' : 'dot-filled');
    inp.classList.add('has-value');
    row.classList.add('filled');
  } else {
    dot.className = 'status-dot dot-empty';
    inp.classList.remove('has-value');
    row.classList.remove('filled');
  }
  updateBadge(k.split('_')[0]);
  updateProgress();
}

function updateBadge(secId) {
  const sec = sections.find(function(s) { return s.id === secId; });
  if (!sec) return;
  var filled = sec.items.filter(function(_, i) {
    return state[key(secId, i)] && state[key(secId, i)].qty !== '';
  }).length;
  var el = document.getElementById('badge_' + secId);
  if (el) el.textContent = filled + ' / ' + sec.items.length;
}

function updateProgress() {
  var total  = Object.keys(state).length;
  var filled = Object.values(state).filter(function(s) { return s.qty !== ''; }).length;
  document.getElementById('prog-label').textContent = filled + ' / ' + total + ' itens';
  document.getElementById('prog-fill').style.width = (total ? (filled / total * 100) : 0) + '%';
}

function toggleSec(id) {
  var body = document.getElementById('body_' + id);
  var hdr  = body.previousElementSibling;
  body.classList.toggle('hidden');
  hdr.classList.toggle('collapsed');
}

function expandAll()  {
  sections.forEach(function(s) {
    document.getElementById('body_' + s.id).classList.remove('hidden');
    document.getElementById('sec_' + s.id).querySelector('.section-header').classList.remove('collapsed');
  });
}
function collapseAll() {
  sections.forEach(function(s) {
    document.getElementById('body_' + s.id).classList.add('hidden');
    document.getElementById('sec_' + s.id).querySelector('.section-header').classList.add('collapsed');
  });
}

function clearAll() {
  if (!confirm('Limpar todos os dados preenchidos?')) return;
  Object.keys(state).forEach(function(k) { state[k] = { qty: '', obs: '' }; });
  pedidoState.length = 0;
  render();
  renderPedidos();
}

// ── RESUMO ────────────────────────────────────────────────────────────────────
function showSummary() {
  var date  = document.getElementById('audit-date').value || '—';
  var resp  = document.getElementById('audit-resp').value || '—';
  var turno = document.getElementById('audit-turno').value || '—';
  var txt   = 'AUDITORIA DE ESTOQUE — DUE RESTAURANTE\n';
  txt += 'Data: ' + date + '  |  Responsável: ' + resp + '  |  Turno: ' + turno + '\n';
  txt += '═'.repeat(50) + '\n';

  sections.forEach(function(sec) {
    var anyFilled = sec.items.some(function(_, i) {
      return state[key(sec.id, i)] && state[key(sec.id, i)].qty !== '';
    });
    if (!anyFilled) return;
    txt += '\n' + sec.emoji + ' ' + sec.title + '\n' + '─'.repeat(40) + '\n';
    sec.items.forEach(function(item, idx) {
      var s = state[key(sec.id, idx)];
      if (!s || s.qty === '') return;
      txt += '  ' + (item.name + ' ').padEnd(34) + s.qty + ' ' + item.unit + (s.obs ? '  [' + s.obs + ']' : '') + '\n';
    });
  });

  var missing = [];
  sections.forEach(function(sec) {
    sec.items.forEach(function(item, idx) {
      var s = state[key(sec.id, idx)];
      if (!s || s.qty === '') missing.push(sec.emoji + ' ' + item.name);
    });
  });
  if (missing.length) {
    txt += '\n' + '═'.repeat(50) + '\n';
    txt += '⚠️  NÃO VERIFICADOS (' + missing.length + '):\n';
    missing.forEach(function(m) { txt += '  • ' + m + '\n'; });
  }

  document.getElementById('modal-content').textContent = txt;
  document.getElementById('overlay').classList.add('open');
}

function closeOverlay() { document.getElementById('overlay').classList.remove('open'); }

// ── EXPORT JSON ───────────────────────────────────────────────────────────────
function exportJSON() {
  var payload = {
    date:  document.getElementById('audit-date').value,
    resp:  document.getElementById('audit-resp').value,
    turno: document.getElementById('audit-turno').value,
    items: []
  };
  sections.forEach(function(sec) {
    sec.items.forEach(function(item, idx) {
      var s = state[key(sec.id, idx)];
      payload.items.push({ section: sec.title, name: item.name, unit: item.unit, ref: item.ref, qty: s ? s.qty : '', obs: s ? s.obs : '' });
    });
  });
  var blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url; a.download = 'auditoria_' + (payload.date || 'due') + '.json';
  a.click(); URL.revokeObjectURL(url);
}

// ── PEDIDOS ───────────────────────────────────────────────────────────────────
var pedidoState = [];

function addPedidoRow(item, unit, qty, fornecedor, urgente) {
  pedidoState.push({
    item: item || '', unit: unit || '', qty: qty || '',
    fornecedor: fornecedor || '', urgente: urgente || false, done: false
  });
  renderPedidos();
}

function removePedidoRow(idx) {
  pedidoState.splice(idx, 1);
  renderPedidos();
}

function updatePedidoBadge() {
  var total = pedidoState.length;
  var done  = pedidoState.filter(function(p) { return p.done; }).length;
  var el = document.getElementById('pedido-badge');
  if (el) el.textContent = done + ' / ' + total + ' pedidos';
}

function renderPedidos() {
  var tbody = document.getElementById('tbody-pedidos');
  if (!tbody) return;
  tbody.innerHTML = '';

  if (pedidoState.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:18px;color:#aaa;font-size:.85rem">Nenhum item ainda — clique em "+ Adicionar item" acima</td></tr>';
    updatePedidoBadge();
    return;
  }

  pedidoState.forEach(function(p, idx) {
    var tr = document.createElement('tr');
    tr.className = 'item-row pedido-row' + (p.done ? ' filled' : '') + (p.urgente ? ' urgente-row' : '');
    tr.id = 'pedrow_' + idx;

    var chkEl = document.createElement('input');
    chkEl.type = 'checkbox';
    chkEl.checked = p.done;
    chkEl.title = 'Marcar como pedido';
    chkEl.addEventListener('change', (function(i) {
      return function() {
        pedidoState[i].done = this.checked;
        document.getElementById('pedrow_' + i).classList.toggle('filled', this.checked);
        updatePedidoBadge();
      };
    })(idx));

    var chkTd = document.createElement('td');
    chkTd.className = 'center';
    chkTd.appendChild(chkEl);

    var itemInp = document.createElement('input');
    itemInp.className = 'obs-input';
    itemInp.style.fontWeight = '600';
    itemInp.style.color = '#111009';
    itemInp.type = 'text';
    itemInp.value = p.item;
    itemInp.placeholder = 'Nome do item…';
    itemInp.addEventListener('input', (function(i) { return function() { pedidoState[i].item = this.value; }; })(idx));

    var itemTd = document.createElement('td');
    itemTd.appendChild(itemInp);

    var unitInp = document.createElement('input');
    unitInp.className = 'qty-input';
    unitInp.style.width = '60px';
    unitInp.type = 'text';
    unitInp.value = p.unit;
    unitInp.placeholder = 'kg';
    unitInp.addEventListener('input', (function(i) { return function() { pedidoState[i].unit = this.value; }; })(idx));

    var unitTd = document.createElement('td');
    unitTd.className = 'center';
    unitTd.appendChild(unitInp);

    var qtyInp = document.createElement('input');
    qtyInp.className = 'qty-input' + (p.qty ? ' has-value' : '');
    qtyInp.type = 'text';
    qtyInp.value = p.qty;
    qtyInp.placeholder = '0';
    qtyInp.addEventListener('input', (function(i) { return function() { pedidoState[i].qty = this.value; this.classList.toggle('has-value', this.value !== ''); }; })(idx));

    var qtyTd = document.createElement('td');
    qtyTd.className = 'center';
    qtyTd.appendChild(qtyInp);

    var fornInp = document.createElement('input');
    fornInp.className = 'obs-input';
    fornInp.type = 'text';
    fornInp.value = p.fornecedor;
    fornInp.placeholder = 'fornecedor…';
    fornInp.addEventListener('input', (function(i) { return function() { pedidoState[i].fornecedor = this.value; }; })(idx));

    var fornTd = document.createElement('td');
    fornTd.appendChild(fornInp);

    var sel = document.createElement('select');
    sel.className = 'obs-input';
    sel.style.width = '90px';
    sel.style.textAlign = 'center';
    sel.innerHTML = '<option value="normal">Normal</option><option value="urgente">🔴 Urgente</option>';
    sel.value = p.urgente ? 'urgente' : 'normal';
    sel.addEventListener('change', (function(i) {
      return function() {
        pedidoState[i].urgente = this.value === 'urgente';
        document.getElementById('pedrow_' + i).classList.toggle('urgente-row', pedidoState[i].urgente);
      };
    })(idx));

    var selTd = document.createElement('td');
    selTd.className = 'center';
    selTd.appendChild(sel);

    var delBtn = document.createElement('button');
    delBtn.className = 'btn btn-red btn-sm';
    delBtn.style.padding = '4px 8px';
    delBtn.style.fontSize = '.7rem';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', (function(i) { return function() { removePedidoRow(i); }; })(idx));

    var delTd = document.createElement('td');
    delTd.className = 'center';
    delTd.appendChild(delBtn);

    tr.appendChild(chkTd);
    tr.appendChild(itemTd);
    tr.appendChild(unitTd);
    tr.appendChild(qtyTd);
    tr.appendChild(fornTd);
    tr.appendChild(selTd);
    tr.appendChild(delTd);
    tbody.appendChild(tr);
  });

  updatePedidoBadge();
}

function togglePedido() {
  var body = document.getElementById('pedido-body');
  var hdr  = document.getElementById('pedido-hdr');
  body.classList.toggle('hidden');
  hdr.classList.toggle('collapsed');
}

function exportPedido() {
  var date    = document.getElementById('audit-date').value || new Date().toISOString().slice(0,10);
  var pending = pedidoState.filter(function(p) { return !p.done; });
  if (!pending.length) { alert('Nenhum item pendente no pedido.'); return; }

  var txt  = 'PEDIDO — DUE RESTAURANTE\nData: ' + date + '\n' + '═'.repeat(40) + '\n\n';
  var urg  = pending.filter(function(p) { return p.urgente; });
  var norm = pending.filter(function(p) { return !p.urgente; });

  if (urg.length) {
    txt += '🔴 URGENTE\n' + '─'.repeat(30) + '\n';
    urg.forEach(function(p) { txt += '  • ' + p.item + (p.qty ? ' — ' + p.qty + ' ' + p.unit : '') + (p.fornecedor ? ' [' + p.fornecedor + ']' : '') + '\n'; });
    txt += '\n';
  }
  if (norm.length) {
    txt += '📦 NORMAL\n' + '─'.repeat(30) + '\n';
    norm.forEach(function(p) { txt += '  • ' + p.item + (p.qty ? ' — ' + p.qty + ' ' + p.unit : '') + (p.fornecedor ? ' [' + p.fornecedor + ']' : '') + '\n'; });
  }

  navigator.clipboard.writeText(txt)
    .then(function() { alert('Pedido copiado para a área de transferência!'); })
    .catch(function() {
      var w = window.open('', '_blank');
      w.document.write('<pre style="font-family:monospace;padding:20px;font-size:14px">' + txt + '</pre>');
    });
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
renderPedidos();
</script>
</body>
</html>
